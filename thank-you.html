<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | MetroTec</title>
  <link rel="stylesheet" href="universal-ui.css">
  <style>
    .thank-you {
      max-width: 600px;
      margin: 4rem auto;
      text-align: center;
      padding: 2rem;
    }
    .thank-you h1 {
      color: var(--primary-700);
      font-size: 2rem;
    }
    .thank-you p {
      color: var(--gray-600);
      font-size: 1.1rem;
      line-height: 1.6;
    }
    .thank-you .cta {
      margin-top: 2rem;
    }
    .thank-you .cta a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--primary-600);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      margin: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="thank-you">
    <h1>✅ Thank You!</h1>
    <p>We've received your message and will get back to you within 1 business day.</p>
    <p>For urgent IT issues, call us directly at <strong><a href="tel:3132427311">(313) 242-7311</a></strong>.</p>
    <div class="cta">
      <a href="/">Back to Home</a>
      <a href="/blog/">Read Our Blog</a>
    </div>
  </div>
</body>
</html>
