<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search | MetroTec IT Solutions</title>
  <meta name="description" content="Search MetroTec's blog, services, and IT resources.">
  <link rel="stylesheet" href="universal-ui.css">
  <link href="/_pagefind/pagefind-ui.css" rel="stylesheet">
  <style>
    .search-page {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .search-page h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: var(--primary-700);
    }
    .pagefind-ui__search-input {
      font-size: 1.1rem !important;
      padding: 0.75rem 1rem !important;
    }
    .pagefind-ui__result-link {
      color: var(--primary-600) !important;
    }
  </style>
</head>
<body>
  <div class="search-page">
    <h1>🔍 Search MetroTec</h1>
    <p style="text-align:center; color: var(--gray-500); margin-bottom: 2rem;">
      Find blog posts, services, IT guides, and more.
    </p>
    <div id="search"></div>
  </div>

  <script src="/_pagefind/pagefind-ui.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      new PagefindUI({
        element: "#search",
        showSubResults: true,
        showImages: true,
        excerptLength: 25
      });
    });
  </script>
</body>
</html>
