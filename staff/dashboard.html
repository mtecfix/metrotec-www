<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Staff Dashboard | MetroTec Tickets</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root{--primary:#0284c7;--primary-dark:#0369a1;--gray-900:#0f172a;--gray-700:#334155;--gray-600:#475569;--gray-200:#e2e8f0;--gray-100:#f1f5f9;--radius:10px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Inter",-apple-system,sans-serif;color:var(--gray-900);background:var(--gray-100);font-size:15px;}
    header{background:#fff;border-bottom:1px solid var(--gray-200);padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
    header .brand{font-weight:700;display:flex;align-items:center;gap:.5rem;color:var(--primary);}
    .wrap{max-width:1100px;margin:1.5rem auto;padding:0 1rem;}
    .card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:1.5rem;}
    /* login */
    .login-wrap{max-width:380px;margin:6vh auto;}
    .login-wrap h1{font-size:1.4rem;margin-bottom:1rem;text-align:center;}
    label{display:block;font-weight:600;font-size:.85rem;margin-bottom:.35rem;color:var(--gray-700);}
    input,select{width:100%;padding:.7rem .85rem;border:1px solid var(--gray-200);border-radius:8px;font-size:.95rem;font-family:inherit;}
    .field{margin-bottom:1rem;}
    button{cursor:pointer;border:none;font-family:inherit;}
    .btn{background:var(--primary);color:#fff;font-weight:600;padding:.7rem 1.2rem;border-radius:8px;font-size:.95rem;width:100%;}
    .btn:disabled{opacity:.6;}
    .btn-sm{width:auto;padding:.4rem .8rem;font-size:.85rem;}
    .btn-ghost{background:#fff;color:var(--gray-700);border:1px solid var(--gray-200);}
    .msg{padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.9rem;display:none;}
    .msg.ok{background:#dcfce7;color:#065f46;display:block;}
    .msg.err{background:#fee2e2;color:#991b1b;display:block;}
    .hidden{display:none;}
    /* tickets */
    .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem;}
    .toolbar h1{font-size:1.3rem;}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;}
    th,td{text-align:left;padding:.7rem .75rem;border-bottom:1px solid var(--gray-100);vertical-align:top;font-size:.88rem;}
    th{background:var(--gray-100);font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.03em;color:var(--gray-600);}
    .pill{display:inline-block;padding:.15rem .55rem;border-radius:1rem;font-size:.72rem;font-weight:700;text-transform:uppercase;}
    .p-urgent{background:#fee2e2;color:#991b1b;}.p-high{background:#ffedd5;color:#9a3412;}
    .p-normal{background:#e0f2fe;color:#075985;}.p-low{background:#f1f5f9;color:#475569;}
    .s-new{background:#dbeafe;color:#1e40af;}.s-open{background:#e0f2fe;color:#075985;}
    .s-pending{background:#fef9c3;color:#854d0e;}.s-resolved{background:#dcfce7;color:#065f46;}.s-closed{background:#f1f5f9;color:#475569;}
    td select{padding:.3rem .4rem;font-size:.8rem;width:auto;}
    .muted{color:var(--gray-600);font-size:.8rem;}
    .msg-text{max-width:340px;white-space:pre-wrap;}
  </style>
</head>
<body>

  <!-- Login view -->
  <div id="loginView">
    <div class="login-wrap card">
      <h1><i class="bi bi-shield-lock"></i> Staff Login</h1>
      <div class="msg" id="loginMsg"></div>
      <form id="loginForm">
        <div class="field"><label for="loginEmail">Email</label><input type="email" id="loginEmail" required autocomplete="username"></div>
        <div class="field"><label for="loginPass">Password</label><input type="password" id="loginPass" required autocomplete="current-password"></div>
        <button type="submit" class="btn" id="loginBtn">Sign In</button>
      </form>
      <div id="newPassBlock" class="hidden" style="margin-top:1rem;">
        <p class="muted" style="margin-bottom:.75rem;">First login — set a new password (min 12 chars, upper/lower/number/symbol).</p>
        <div class="field"><label for="newPass">New Password</label><input type="password" id="newPass"></div>
        <button type="button" class="btn" id="newPassBtn">Set Password & Sign In</button>
      </div>
    </div>
  </div>

  <!-- Dashboard view -->
  <div id="dashView" class="hidden">
    <header>
      <span class="brand"><i class="bi bi-life-preserver"></i> MetroTec Tickets</span>
      <div>
        <button class="btn btn-sm btn-ghost" id="refreshBtn"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        <button class="btn btn-sm btn-ghost" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Sign Out</button>
      </div>
    </header>
    <div class="wrap">
      <div class="msg" id="dashMsg"></div>
      <div class="toolbar">
        <h1>Support Tickets</h1>
        <span class="muted" id="countLabel"></span>
      </div>
      <div class="card" style="margin-bottom:1rem;padding:1rem;">
        <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
          <strong style="font-size:.9rem;">Add Client Portal Account:</strong>
          <input type="email" id="newCustEmail" placeholder="client@company.com" style="padding:.4rem .6rem;border:1px solid var(--gray-200);border-radius:6px;font-size:.85rem;">
          <input type="text" id="newCustName" placeholder="Name (optional)" style="padding:.4rem .6rem;border:1px solid var(--gray-200);border-radius:6px;font-size:.85rem;">
          <button class="btn-sm" id="addCustBtn">Create Account</button>
        </div>
        <div id="custResult" class="muted" style="font-size:.85rem;margin-top:.5rem;"></div>
      </div>
      <table>
        <thead><tr><th>Ticket</th><th>From</th><th>Subject / Message</th><th>Priority</th><th>Status</th><th>Created</th></tr></thead>
        <tbody id="ticketRows"><tr><td colspan="6" class="muted">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    // ── Config ──
    var REGION = "us-east-1";
    var CLIENT_ID = "6a0ot47m7o1hsupjc5l593l5db";
    var API_URL = "https://sebm7k9d9c.execute-api.us-east-1.amazonaws.com";
    var COGNITO = "https://cognito-idp." + REGION + ".amazonaws.com/";

    var idToken = sessionStorage.getItem("mt_id_token") || null;
    var session = null, pendingEmail = null;

    function show(el){el.classList.remove("hidden");}
    function hide(el){el.classList.add("hidden");}
    function setMsg(el,text,kind){el.className="msg "+kind;el.textContent=text;}

    function cognito(target, body){
      return fetch(COGNITO, {
        method:"POST",
        headers:{"Content-Type":"application/x-amz-json-1.1","X-Amz-Target":"AWSCognitoIdentityProviderService."+target},
        body:JSON.stringify(body)
      }).then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});});
    }

    // ── Login ──
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();
      var email=document.getElementById("loginEmail").value.trim();
      var pass=document.getElementById("loginPass").value;
      var btn=document.getElementById("loginBtn");
      var msg=document.getElementById("loginMsg");
      btn.disabled=true;btn.textContent="Signing in…";
      cognito("InitiateAuth",{AuthFlow:"USER_PASSWORD_AUTH",ClientId:CLIENT_ID,AuthParameters:{USERNAME:email,PASSWORD:pass}})
      .then(function(res){
        if(res.ok && res.d.AuthenticationResult){
          idToken=res.d.AuthenticationResult.IdToken;
          sessionStorage.setItem("mt_id_token",idToken);
          enterDashboard();
        } else if(res.d.ChallengeName==="NEW_PASSWORD_REQUIRED"){
          session=res.d.Session; pendingEmail=email;
          show(document.getElementById("newPassBlock"));
          setMsg(msg,"Please set a new password to continue.","ok");
        } else {
          setMsg(msg,(res.d.message||"Login failed."),"err");
        }
      })
      .catch(function(){setMsg(msg,"Network error.","err");})
      .finally(function(){btn.disabled=false;btn.textContent="Sign In";});
    });

    // ── New password challenge ──
    document.getElementById("newPassBtn").addEventListener("click", function(){
      var np=document.getElementById("newPass").value;
      var msg=document.getElementById("loginMsg");
      cognito("RespondToAuthChallenge",{ChallengeName:"NEW_PASSWORD_REQUIRED",ClientId:CLIENT_ID,Session:session,ChallengeResponses:{USERNAME:pendingEmail,NEW_PASSWORD:np}})
      .then(function(res){
        if(res.ok && res.d.AuthenticationResult){
          idToken=res.d.AuthenticationResult.IdToken;
          sessionStorage.setItem("mt_id_token",idToken);
          enterDashboard();
        } else {
          setMsg(msg,(res.d.message||"Could not set password."),"err");
        }
      });
    });

    // ── Dashboard ──
    function enterDashboard(){
      hide(document.getElementById("loginView"));
      show(document.getElementById("dashView"));
      loadTickets();
    }
    function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}

    function loadTickets(){
      var rows=document.getElementById("ticketRows");
      var msg=document.getElementById("dashMsg");
      rows.innerHTML='<tr><td colspan="6" class="muted">Loading…</td></tr>';
      fetch(API_URL+"/tickets",{headers:{Authorization:idToken}})
      .then(function(r){
        if(r.status===401){throw new Error("Session expired. Please sign in again.");}
        return r.json();
      })
      .then(function(d){
        var t=d.tickets||[];
        document.getElementById("countLabel").textContent=t.length+" ticket(s)";
        if(!t.length){rows.innerHTML='<tr><td colspan="6" class="muted">No tickets yet.</td></tr>';return;}
        rows.innerHTML=t.map(function(x){
          var pr=x.priority||"normal", st=x.status||"new";
          var id=esc(x.ticketId);
          var thread=(x.comments||[]).map(function(c){return '<div style="font-size:.82rem;margin-bottom:.35rem;"><strong>'+esc(c.role==="staff"?"MetroTec":"Customer")+'</strong> <span class="muted">'+esc((c.at||"").slice(0,16).replace("T"," "))+'</span><br>'+esc(c.text)+'</div>';}).join("");
          return '<tr>'+
            '<td><strong>'+id+'</strong></td>'+
            '<td>'+esc(x.name)+'<br><span class="muted">'+esc(x.email)+'</span></td>'+
            '<td><strong>'+esc(x.subject)+'</strong><div class="msg-text muted">'+esc(x.message)+'</div></td>'+
            '<td><span class="pill p-'+pr+'">'+pr+'</span></td>'+
            '<td><select data-id="'+id+'" class="statusSel">'+
              ["new","open","pending","resolved","closed"].map(function(s){return '<option value="'+s+'"'+(s===st?" selected":"")+'>'+s+'</option>';}).join("")+
            '</select></td>'+
            '<td class="muted">'+esc((x.createdAt||"").slice(0,16).replace("T"," "))+'</td>'+
          '</tr>'+
          '<tr class="thread-row"><td colspan="6" style="background:#fafbfc;">'+
            '<div style="margin-bottom:.5rem;">'+(thread||'<span class="muted" style="font-size:.82rem;">No replies yet.</span>')+'</div>'+
            '<div id="aidraft-'+id+'" class="muted" style="font-size:.82rem;white-space:pre-wrap;margin-bottom:.5rem;"></div>'+
            '<div style="display:flex;gap:.5rem;align-items:flex-start;">'+
              '<textarea class="replyBox" data-id="'+id+'" placeholder="Type a reply to the customer…" style="flex:1;min-height:52px;padding:.5rem;border:1px solid var(--gray-200);border-radius:6px;font-family:inherit;font-size:.85rem;"></textarea>'+
              '<button class="btn-sm aiBtn" data-id="'+id+'" style="background:#7c3aed;color:#fff;white-space:nowrap;">✨ AI Draft</button>'+
              '<button class="btn-sm sendBtn" data-id="'+id+'" style="white-space:nowrap;">Send Reply</button>'+
            '</div>'+
          '</td></tr>';
        }).join("");
        Array.prototype.forEach.call(document.querySelectorAll(".statusSel"),function(sel){
          sel.addEventListener("change",function(){updateStatus(sel.getAttribute("data-id"),sel.value);});
        });
        Array.prototype.forEach.call(document.querySelectorAll(".aiBtn"),function(b){
          b.addEventListener("click",function(){aiDraft(b.getAttribute("data-id"),b);});
        });
        Array.prototype.forEach.call(document.querySelectorAll(".sendBtn"),function(b){
          b.addEventListener("click",function(){sendReply(b.getAttribute("data-id"),b);});
        });
      })
      .catch(function(err){setMsg(msg,err.message,"err");});
    }

    function boxFor(id){return document.querySelector('.replyBox[data-id="'+id.replace(/"/g,'')+'"]');}

    function aiDraft(id,btn){
      var msg=document.getElementById("dashMsg");
      var out=document.getElementById("aidraft-"+id);
      btn.disabled=true;var old=btn.textContent;btn.textContent="Drafting…";
      fetch(API_URL+"/tickets/"+encodeURIComponent(id)+"/ai-draft",{
        method:"POST",headers:{Authorization:idToken,"Content-Type":"application/json"},body:"{}"
      })
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok&&d.ai){
          out.textContent=d.ai;
          // Pre-fill reply box with the "DRAFT REPLY:" portion if present.
          var m=d.ai.split(/DRAFT REPLY:/i);
          var box=boxFor(id);
          if(box&&m[1]){box.value=m[1].trim();}
          setMsg(msg,"AI draft ready — review/edit before sending.","ok");
        } else {
          setMsg(msg,(d.error||"AI draft failed"),"err");
        }
      })
      .catch(function(){setMsg(msg,"Network error getting AI draft.","err");})
      .finally(function(){btn.disabled=false;btn.textContent=old;});
    }

    function sendReply(id,btn){
      var msg=document.getElementById("dashMsg");
      var box=boxFor(id);
      var text=box?box.value.trim():"";
      if(!text){setMsg(msg,"Reply is empty.","err");return;}
      btn.disabled=true;var old=btn.textContent;btn.textContent="Sending…";
      fetch(API_URL+"/tickets/"+encodeURIComponent(id)+"/reply",{
        method:"POST",headers:{Authorization:idToken,"Content-Type":"application/json"},
        body:JSON.stringify({reply:text})
      })
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok){setMsg(msg,"Reply sent on "+id,"ok");loadTickets();}
        else{setMsg(msg,(d.error||"Send failed"),"err");btn.disabled=false;btn.textContent=old;}
      })
      .catch(function(){setMsg(msg,"Network error sending reply.","err");btn.disabled=false;btn.textContent=old;});
    }

    function updateStatus(id,status){
      var msg=document.getElementById("dashMsg");
      fetch(API_URL+"/tickets/"+encodeURIComponent(id),{
        method:"PATCH",headers:{Authorization:idToken,"Content-Type":"application/json"},
        body:JSON.stringify({status:status})
      })
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok){setMsg(msg,"Updated "+id+" → "+status,"ok");}
        else{setMsg(msg,(d.error||"Update failed"),"err");}
      })
      .catch(function(){setMsg(msg,"Network error updating ticket.","err");});
    }

    document.getElementById("refreshBtn").addEventListener("click",loadTickets);

    document.getElementById("addCustBtn").addEventListener("click",function(){
      var email=document.getElementById("newCustEmail").value.trim();
      var name=document.getElementById("newCustName").value.trim();
      var out=document.getElementById("custResult");
      var btn=this;
      if(!email){out.textContent="Enter an email.";return;}
      btn.disabled=true;btn.textContent="Creating…";
      fetch(API_URL+"/customers",{method:"POST",headers:{Authorization:idToken,"Content-Type":"application/json"},body:JSON.stringify({email:email,name:name})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok){
          out.innerHTML='<span style="color:#065f46;">Account created for <strong>'+esc(d.email)+'</strong>. Temporary password: <strong>'+esc(d.tempPassword)+'</strong> — give this to the client; they set their own on first login.</span>';
          document.getElementById("newCustEmail").value="";document.getElementById("newCustName").value="";
        } else {
          out.innerHTML='<span style="color:#991b1b;">'+esc(d.error||"Could not create account")+'</span>';
        }
      })
      .catch(function(){out.innerHTML='<span style="color:#991b1b;">Network error.</span>';})
      .finally(function(){btn.disabled=false;btn.textContent="Create Account";});
    });    document.getElementById("logoutBtn").addEventListener("click",function(){
      sessionStorage.removeItem("mt_id_token");location.reload();
    });

    // auto-enter if we already have a token
    if(idToken){enterDashboard();}
  </script>
</body>
</html>
