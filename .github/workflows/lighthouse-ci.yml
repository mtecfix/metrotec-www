name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.css'
      - 'blog/**/*.html'
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Start local server
        run: |
          npx serve . -l 8080 &
          sleep 3

      - name: Run Lighthouse audits
        run: |
          lhci autorun \
            --collect.url=http://localhost:8080/index.html \
            --collect.url=http://localhost:8080/services.html \
            --collect.url=http://localhost:8080/about.html \
            --collect.url=http://localhost:8080/contact.html \
            --collect.url=http://localhost:8080/blog/index.html \
            --upload.target=temporary-public-storage || true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 14
